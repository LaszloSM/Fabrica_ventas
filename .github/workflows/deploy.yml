name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}

  deploy-backend:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend:${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy backend to Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ./backend
          registryUrl: ghcr.io
          registryUsername: ${{ github.actor }}
          registryPassword: ${{ secrets.GITHUB_TOKEN }}
          containerAppName: ${{ secrets.AZURE_BACKEND_APP_NAME }}
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ${{ env.BACKEND_IMAGE }}
          targetPort: 8000

  deploy-frontend:
    needs: deploy-backend
    runs-on: ubuntu-latest
    env:
      FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy frontend to Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: .
          registryUrl: ghcr.io
          registryUsername: ${{ github.actor }}
          registryPassword: ${{ secrets.GITHUB_TOKEN }}
          containerAppName: ${{ secrets.AZURE_FRONTEND_APP_NAME }}
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ${{ env.FRONTEND_IMAGE }}
          targetPort: 3000
