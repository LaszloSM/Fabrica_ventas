name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: coimpactobacr.azurecr.io
  RESOURCE_GROUP: coimpactob-crm-prod
  BACKEND_APP: coimpactob-api-prod
  FRONTEND_APP: coimpactob-web-prod

jobs:
  deploy-backend:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build & push backend image
        run: |
          az acr build \
            --registry coimpactobacr \
            --image coimpactob-api-prod:${{ github.sha }} \
            --image coimpactob-api-prod:latest \
            ./backend

      - name: Deploy backend to Container Apps
        run: |
          az containerapp update \
            --name ${{ env.BACKEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.BACKEND_APP }}:${{ github.sha }}

  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build & push frontend image
        run: |
          az acr build \
            --registry coimpactobacr \
            --image coimpactob-web-prod:${{ github.sha }} \
            --image coimpactob-web-prod:latest \
            ./frontend

      - name: Deploy frontend to Container Apps
        run: |
          az containerapp update \
            --name ${{ env.FRONTEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.FRONTEND_APP }}:${{ github.sha }}
