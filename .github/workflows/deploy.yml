name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: coimpactobacr.azurecr.io
  RESOURCE_GROUP: coimpactob-crm-prod
  BACKEND_APP: coimpactob-api-prod
  FRONTEND_APP: coimpactob-web-prod
  FRONTEND_URL: https://coimpactob-web-prod.lemonmushroom-85e2b96f.westus2.azurecontainerapps.io
  BACKEND_URL: https://coimpactob-api-prod.lemonmushroom-85e2b96f.westus2.azurecontainerapps.io

jobs:
  deploy-backend:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: coimpactobacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            coimpactobacr.azurecr.io/coimpactob-api-prod:${{ github.sha }}
            coimpactobacr.azurecr.io/coimpactob-api-prod:latest

      - name: Deploy backend to Container Apps
        run: |
          az containerapp update \
            --name ${{ env.BACKEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/coimpactob-api-prod:${{ github.sha }} \
            --set-env-vars \
              APP_NAME="CoimpactoB CRM API" \
              DEBUG="false" \
              USE_MOCK_DB="false" \
              COSMOS_CONNECTION_STRING="${{ secrets.COSMOS_CONNECTION_STRING }}" \
              COSMOS_DATABASE="fabrica_ventas" \
              SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              "CORS_ORIGINS=[\"${{ env.FRONTEND_URL }}\",\"http://localhost:3000\",\"http://localhost:8080\"]"

  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: coimpactobacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            coimpactobacr.azurecr.io/coimpactob-web-prod:${{ github.sha }}
            coimpactobacr.azurecr.io/coimpactob-web-prod:latest

      - name: Deploy frontend to Container Apps
        run: |
          az containerapp update \
            --name ${{ env.FRONTEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/coimpactob-web-prod:${{ github.sha }} \
            --set-env-vars \
              NODE_ENV="production" \
              FASTAPI_BACKEND_URL="${{ env.BACKEND_URL }}" \
              GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              SESSION_SECRET="${{ secrets.SESSION_SECRET }}" \
              PORT="8080"
