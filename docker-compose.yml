version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coimpactob_backend
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=CoimpactoB CRM API
      - DEBUG=false
      - COSMOS_CONNECTION_STRING=${COSMOS_CONNECTION_STRING}
      - COSMOS_DATABASE=fabrica_ventas
      - USE_MOCK_DB=false
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=mixtral-8x7b-32768
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - SENDGRID_FROM_EMAIL=noreply@coimpactob.com
      - SECRET_KEY=${SECRET_KEY:-dev_secret_only}
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:8080"]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coimpactob_frontend
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - FASTAPI_BACKEND_URL=http://backend:8000
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET:-coimpactob-change-me}
      - PORT=8080
    depends_on:
      - backend
    restart: unless-stopped
