version: '3.8'

services:
  api:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile
    container_name: crm_api
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=CoimpactoB CRM API
      - DEBUG=True
      - COSMOS_CONNECTION_STRING=${COSMOS_CONNECTION_STRING:-mongodb://admin:password@mongo:27017}
      - COSMOS_DATABASE=fabrica_ventas_dev
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=mixtral-8x7b-32768
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - SENDGRID_FROM_EMAIL=noreply@coimpactob.com
      - SECRET_KEY=dev_secret_key_12345
      - CORS_ORIGINS=["http://localhost:3000", "http://localhost:8000"]
    volumes:
      - ./backend:/app
    depends_on:
      - mongo
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  mongo:
    image: mongo:6
    container_name: crm_mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
